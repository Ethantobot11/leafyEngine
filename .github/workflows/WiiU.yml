name: Build Leafy Engine (Wii U)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest # Use the official devkitPro image

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Haxe
        run: |
          apt-get update
          apt-get install -y haxe
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Wii U Dependencies
        run: |
          # Install the specialized forks required for Leafy/Reflaxe
          haxelib git reflaxe https://github.com/SomeRanDev/reflaxe
          haxelib git reflaxe.CPP https://github.com/Slushi-Github/reflaxe.CPP
          haxelib git HxU_WUT https://github.com/Haxe-WiiU/HxU_WUT
          haxelib git HxU_SDL2 https://github.com/Haxe-WiiU/HxU_SDL2
          # Add any other libraries Leafy Engine needs here

      - name: Download and Build with hxCompileU
        run: |
          # 1. Download
          curl -L -o hxCompileU.zip https://github.com/Slushi-Github/hxCompileU/releases/download/1.5.5/Linux64_HxCompileU.zip
          
          # 2. Extract
          unzip hxCompileU.zip
          
          # 3. Rename the inflated file to match your script
          mv haxeCompileU hxCompileU
          
          # 4. Make it executable
          chmod +x ./hxCompileU
          
          # 5. Run the build commands
          ./hxCompileU --prepare
          ./hxCompileU --compile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiU-Build
          path: export/wiiuFiles/*.wuhb
