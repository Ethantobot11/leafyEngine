name: Build Leafy Engine (Wii U)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest # Use the official devkitPro image

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Haxe
        run: |
          apt-get update
          apt-get install -y haxe
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Wii U Dependencies
        run: |
          # Install the specialized forks required for Leafy/Reflaxe
          haxelib git reflaxe https://github.com/SomeRanDev/reflaxe
          haxelib git reflaxe.CPP https://github.com/Slushi-Github/reflaxe.CPP
          haxelib git HxU_WUT https://github.com/Haxe-WiiU/HxU_WUT
          haxelib git HxU_SDL2 https://github.com/Haxe-WiiU/HxU_SDL2
          # Add any other libraries Leafy Engine needs here

      - name: Build and Run hxCompileU (Manual C++ Build)
        run: |
          # 1. Clone the tool
          git clone --branch main https://github.com/Slushi-Github/hxCompileU.git
          cd hxCompileU
          
          # 2. Patch the Int null error
          sed -i '126s/null/0/g' src/compilers/HaxeCompiler.hx
          
          # 3. Build specifically for C++ (Linux)
          # We point to the 'src' folder and tell it the Main class is in 'src'
          haxe -cp src -main Main --cpp export -D no-deprecation-warnings
          
          # 4. Move the resulting binary back to the project root
          # Note: C++ builds usually create the binary inside the export folder
          mv export/Main ../hxCompileU
          cd ..
          
          # 5. Run the tool
          chmod +x ./hxCompileU
          ./hxCompileU --prepare
          ./hxCompileU --compile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiU-Build
          path: export/wiiuFiles/*.wuhb
