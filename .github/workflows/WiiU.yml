name: Build Leafy Engine (Wii U)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-wiiu:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest # Use the official devkitPro image

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Haxe
        run: |
          apt-get update
          apt-get install -y haxe
          haxelib setup ~/haxelib

      - name: Install System Dependencies (Wii U)
        run: |
          # These are the specific libraries Leafy Engine needs
          dkp-pacman -Syu --noconfirm wiiu-sdl2 wiiu-sdl2-image wiiu-sdl2-mixer wiiu-sdl2-ttf wiiu-curl ppc-jansson wiiu-wut

      - name: Install Haxe Libraries
        run: |
          # Install the compiler and the engine
          haxelib install leafyEngine
          haxelib git hxCompileU https://github.com/Slushi-Github/hxCompileU
          # Note: Leafy requires a specific version of Reflaxe/C++
          haxelib git reflaxe.CPP https://github.com/SomeRanDev/reflaxe.CPP
          haxelib git slushiUtilsU https://github.com/Slushi-Github/slushiUtilsU
          # Add any other libraries from your project.xml here

      - name: Build Project
        run: |
          # We use hxCompileU to do the heavy lifting
          # This assumes your config file is named hxCompileUConfig.json
          haxelib run hxCompileU --compile
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiiu-build
          path: |
            export/wiiuFiles/*.rpx
            export/wiiuFiles/*.wuhb
