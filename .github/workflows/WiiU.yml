name: Build Leafy Engine (Wii U)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-wiiu:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETUP CACHE FIRST
   #    - name: Cache devkitPro
    #     id: cache-dkp
     #    uses: actions/cache@v4
      #   with:
      #     path: /opt/devkitpro
          # The key includes a hash of the workflow so if you change packages, it invalidates
       #    key: ${{ runner.os }}-devkitpro-wiiu-${{ github.run_id }}
      #     restore-keys: |
     #       ${{ runner.os }}-devkitpro-wiiu                          

      - name: Install Haxe 4.3.6
        run: |
          apt-get update
          apt-get install -y wget
          # libneko2 is the package that provides libneko.so.2
          apt-get install -y wget neko libneko2
          
          # Download
          wget https://github.com/HaxeFoundation/haxe/releases/download/4.3.6/haxe-4.3.6-linux64.tar.gz
          
          # Extract into a specific temporary folder
          mkdir hx_tmp
          tar -xvf haxe-4.3.6-linux64.tar.gz -C hx_tmp
          
          # Find where the 'haxe' binary is and move everything
          # This works regardless of whether the folder is named 'haxe-4.3.6' or 'haxe-4.3.6-linux64'
          HX_DIR=$(find hx_tmp -name "haxe" -type f | xargs dirname)
          
          cp $HX_DIR/haxe /usr/local/bin/
          cp $HX_DIR/haxelib /usr/local/bin/
          mkdir -p /usr/local/lib/haxe
          cp -r $HX_DIR/std /usr/local/lib/haxe/
          
          # Setup haxelib
          mkdir -p /github/home/haxelib
          haxelib setup /github/home/haxelib

      - name: Fix 403 Forbidden (Pacman User-Agent)
        run: |
          echo 'XferCommand = /usr/bin/wget -U "dkp-pacman" --passive-ftp -c -O %o %u' | tee -a /opt/devkitpro/pacman/etc/pacman.conf
          rm -rf /var/lib/pacman/sync/*

      # 2. ONLY INSTALL IF CACHE MISS
      - name: Install Wii U System Dependencies
       #  if: steps.cache-dkp.outputs.cache-hit != 'true'
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm wiiu-dev wiiu-sdl2 wiiu-sdl2_image wiiu-sdl2_mixer wiiu-sdl2_ttf wiiu-curl ppc-jansson ppc-libvorbisidec

      - name: Install Haxe Wii U Libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib git hxCompileU https://github.com/Ethantobot11/hxCompileU --quiet
          # 1. Base Reflaxe (Mandatory for 'cxx' package)
          haxelib git reflaxe https://github.com/SomeRanDev/reflaxe --quiet
          # 2. Reflaxe C++ Output
          haxelib git reflaxe.cpp https://github.com/SomeRanDev/reflaxe.cpp --quiet
          # 3. Leafy Engine (Lowercase to fix the [WARNING])
          haxelib git leafyengine https://github.com/Slushi-Github/leafyEngine --quiet
          haxelib git hxu_wut https://github.com/Slushi-Github/hxWUT --quiet
          haxelib git hxu_libnotifications https://github.com/Slushi-Github/hxLibNotifications --quiet
          haxelib git hxu_libmappedMemory https://github.com/Slushi-Github/hxLibMappedMemory --quiet
          haxelib git slushiutilsu https://github.com/Slushi-Github/slushiUtilsU --quiet
          haxelib git hxu_sdl2 https://github.com/Slushi-Github/hxSDL2 --quiet
          haxelib git hxu_sdl_fontcache https://github.com/Slushi-Github/hxSDL_FontCache --quiet
          haxelib git hxu_jansson https://github.com/Slushi-Github/hxJansson --quiet
          haxelib git hxu_vorbis https://github.com/Slushi-Github/hxVorbis --quiet

      - name: Build hxCompileU Tool
        run: |
          cd /github/home/haxelib/hxCompileU/git
          
          # 1. Compile the tool to a real C++ binary for the Ubuntu Runner
          # This avoids the 'eval' interpreter entirely.
          haxe -cp src -main src.Main -cpp out_linux -D HXCPP_M64
          
          # 2. Move the finished binary to your project root
          cp out_linux/Main $GITHUB_WORKSPACE/hxcompileu_bin
          chmod +x $GITHUB_WORKSPACE/hxcompileu_bin

      - name: Build Leafy Engine Project
        run: |
          export HAXELIB_PATH=/github/home/haxelib
          haxelib setup $HAXELIB_PATH

          # 1. Generate the base HXML
          ./hxcompileu_bin --compile || true

          # 2. Create the Fixed HXML with corrected Class Paths
          # Reflaxe.cpp
          echo "-cp /github/home/haxelib/reflaxe,cpp/git/std" > fixed.hxml
          echo "-cp /github/home/haxelib/reflaxe,cpp/git/src" >> fixed.hxml
          echo "-cp /github/home/haxelib/reflaxe/git/src" >> fixed.hxml
          
          # Libraries where the package is NOT in the root (but in a subfolder)
          # We point to the folder that CONTAINS the package folder
          echo "-cp /github/home/haxelib/hxu_jansson/git/jansson" >> fixed.hxml
          echo "-cp /github/home/haxelib/hxu_libmappedmemory/git/memory" >> fixed.hxml
          echo "-cp /github/home/haxelib/hxu_wut/git/wut" >> fixed.hxml
          
          # Libraries where the package IS in the root
          echo "-cp /github/home/haxelib/hxsdl2/git/sdl2" >> fixed.hxml
          echo "-cp /github/home/haxelib/hxvorbis/git/vorbis" >> fixed.hxml
          echo "-cp /github/home/haxelib/hxu_sdl_fontcache/git/sdl_fontcache" >> fixed.hxml
          echo "-cp /github/home/haxelib/slushiutilsu/git/wiiu" >> fixed.hxml
          
          # Leafy Engine
          echo "-cp /github/home/haxelib/leafyengine/git" >> fixed.hxml
          
          # 3. Append generated flags from the tool
          cat temphxml.hxml >> fixed.hxml

          # 4. Final adjustments for packages and main class
          # We force 'leafy.Leafy' because Leafy.hx is inside the leafy/ folder
          sed -i "s/-main leafy.Leafy/-main leafy.Leafy/g" fixed.hxml
          sed -i "s/-main Leafy/-main leafy.Leafy/g" fixed.hxml
          sed -i "s/-main src.Main/-main leafy.Leafy/g" fixed.hxml
          
          # Fix the Reflaxe define to match the main class
          sed -i "s/-D mainClass=src.Main/-D mainClass=leafy.Leafy/g" fixed.hxml
          sed -i "s/-D mainClass=Leafy/-D mainClass=leafy.Leafy/g" fixed.hxml
          
          # Ensure current directory is checked for the local 'leafy' folder
          sed -i "s/-cp src/-cp ./g" fixed.hxml

          echo "--- FINAL HXML CONFIGURATION ---"
          cat fixed.hxml
          echo "--------------------------------"

          # 5. Run the Haxe Compiler
          haxe fixed.hxml

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: LeafyEngine-WiiU
          path: |
            export/wiiuFiles/*.rpx
            export/wiiuFiles/*.wuhb
