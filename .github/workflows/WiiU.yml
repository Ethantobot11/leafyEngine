name: Build Leafy Engine (Wii U)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-wiiu:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Haxe
        run: |
          apt-get update
          apt-get install -y haxe
          haxelib setup ~/haxelib

      - name: Install Wii U System Dependencies
        run: |
          # 1. Update the database
          dkp-pacman -Syu --noconfirm
          
          # 2. Install the core Wii U toolchain
          dkp-pacman -S --noconfirm wiiu-dev
          
          # 3. Install specific Portlibs with corrected names
          # Note: devkitPro uses underscores for some Wii U SDL2 sub-packages
          dkp-pacman -S --noconfirm \
            wiiu-sdl2 \
            wiiu-sdl2_image \
            wiiu-sdl2_mixer \
            wiiu-sdl2_ttf \
            wiiu-curl \
            ppc-jansson \
            ppc-libvorbisidec

      - name: Install Haxe Wii U Libraries
        run: |
          # Core Tools
          haxelib git hxCompileU https://github.com/Slushi-Github/hxCompileU --quiet
          haxelib git reflaxe.CPP https://github.com/SomeRanDev/reflaxe.CPP --quiet
          
          # The Specific Libraries You Listed
          haxelib git HxU_WUT https://github.com/Slushi-Github/hxWUT --quiet
          haxelib git HxU_LibNotifications https://github.com/Slushi-Github/hxLibNotifications --quiet
          haxelib git HxU_LibMappedMemory https://github.com/Slushi-Github/hxLibMappedMemory --quiet
          haxelib git SlushiUtilsU https://github.com/Slushi-Github/slushiUtilsU --quiet
          haxelib git HxU_SDL2 https://github.com/Slushi-Github/hxSDL2 --quiet
          haxelib git HxU_SDL_FontCache https://github.com/Slushi-Github/hxSDL_FontCache --quiet
          haxelib git HxU_Jansson https://github.com/Slushi-Github/hxJansson --quiet
          haxelib git HxU_Vorbis https://github.com/Slushi-Github/hxVorbis --quiet
          
          # The Engine Itself
          haxelib git leafyEngine https://github.com/Slushi-Github/leafyEngine --quiet

      - name: Patch HaxeCompiler.hx
        run: |
          # This replaces the null assignment with 0 to satisfy the static platform check
          # or changes the type to Null<Int>
          sed -i 's/:Int = null/:Null<Int> = null/g' /github/home/haxelib/hxCompileU/git/src/compilers/HaxeCompiler.hx

      - name: Build hxCompileU Tool
        run: |
          cd /github/home/haxelib/hxCompileU/git
          haxe build.hxml --macro "allowPackage('flash')" -D no-null-safety
          echo "/github/home/haxelib/hxCompileU/git/export" >> $GITHUB_PATH

      - name: Build Leafy Engine Project
        run: |
          # Now that hxCompileU is built and in our PATH, we can run it.
          # We use --compile to trigger the Makefile generation and GCC compilation.
          hxCompileU --compile

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: LeafyEngine-WiiU
          path: |
            export/wiiuFiles/*.rpx
            export/wiiuFiles/*.wuhb
