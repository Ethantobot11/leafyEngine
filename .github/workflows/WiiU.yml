name: Build Leafy Engine (Wii U)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-wiiu:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETUP CACHE FIRST
   #    - name: Cache devkitPro
    #     id: cache-dkp
     #    uses: actions/cache@v4
      #   with:
      #     path: /opt/devkitpro
          # The key includes a hash of the workflow so if you change packages, it invalidates
       #    key: ${{ runner.os }}-devkitpro-wiiu-${{ github.run_id }}
      #     restore-keys: |
     #       ${{ runner.os }}-devkitpro-wiiu                          

      - name: Install Haxe 4.3.6
        run: |
          apt-get update
          apt-get install -y wget
          # Download the official 4.3.6 Linux binary
          wget https://github.com/HaxeFoundation/haxe/releases/download/4.3.6/haxe-4.3.6-linux64.tar.gz
          tar -xvf haxe-4.3.6-linux64.tar.gz
          
          # The folder is named haxe-4.3.6-linux64
          cd haxe-4.3.6-linux64
          cp haxe /usr/local/bin/
          cp haxelib /usr/local/bin/
          mkdir -p /usr/local/lib/haxe
          cp -r std /usr/local/lib/haxe/
          
          # Setup haxelib in the shared github home
          mkdir -p /github/home/haxelib
          haxelib setup /github/home/haxelib

      - name: Fix 403 Forbidden (Pacman User-Agent)
        run: |
          echo 'XferCommand = /usr/bin/wget -U "dkp-pacman" --passive-ftp -c -O %o %u' | tee -a /opt/devkitpro/pacman/etc/pacman.conf
          rm -rf /var/lib/pacman/sync/*

      # 2. ONLY INSTALL IF CACHE MISS
      - name: Install Wii U System Dependencies
       #  if: steps.cache-dkp.outputs.cache-hit != 'true'
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm wiiu-dev wiiu-sdl2 wiiu-sdl2_image wiiu-sdl2_mixer wiiu-sdl2_ttf wiiu-curl ppc-jansson ppc-libvorbisidec

      - name: Install Haxe Wii U Libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib git hxCompileU https://github.com/Ethantobot11/hxCompileU --quiet
          haxelib git reflaxe.cpp https://github.com/SomeRanDev/reflaxe.cpp --quiet
          haxelib git hxu_wut https://github.com/Slushi-Github/hxWUT --quiet
          haxelib git hxu_libnotifications https://github.com/Slushi-Github/hxLibNotifications --quiet
          haxelib git hxu_libmappedMemory https://github.com/Slushi-Github/hxLibMappedMemory --quiet
          haxelib git slushiutilsu https://github.com/Slushi-Github/slushiUtilsU --quiet
          haxelib git hxu_sdl2 https://github.com/Slushi-Github/hxSDL2 --quiet
          haxelib git hxu_sdl_fontcache https://github.com/Slushi-Github/hxSDL_FontCache --quiet
          haxelib git hxu_jansson https://github.com/Slushi-Github/hxJansson --quiet
          haxelib git hxu_vorbis https://github.com/Slushi-Github/hxVorbis --quiet
          haxelib git leafyEngine https://github.com/Slushi-Github/leafyEngine --quiet

      - name: Build hxCompileU Tool
        run: |
          cd /github/home/haxelib/hxCompileU/git
          
          # 1. Compile the tool to a real C++ binary for the Ubuntu Runner
          # This avoids the 'eval' interpreter entirely.
          haxe -cp src -main src.Main -cpp out_linux -D HXCPP_M64
          
          # 2. Move the finished binary to your project root
          cp out_linux/Main $GITHUB_WORKSPACE/hxcompileu_bin
          chmod +x $GITHUB_WORKSPACE/hxcompileu_bin

      - name: Build Leafy Engine Project
        run: |
          # 1. Ensure Haxelib is initialized for this shell
          haxelib setup ~/haxelib
          
          # 2. Add the -lib flags specifically if the HXML fails to find them,
          # but first, let's make sure the tool uses the right haxelib repo.
          # We'll run the binary, but we tell Haxe where the libs are via an Env Var.
          export HAXELIB_PATH=~/haxelib
          # Now we run the compiled binary directly. 
          # No 'haxe --run', no 'eval' errors.
          ./hxcompileu_bin --compile

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: LeafyEngine-WiiU
          path: |
            export/wiiuFiles/*.rpx
            export/wiiuFiles/*.wuhb
